<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>데스매치 로또 V19.8 - 번호 일치 보정 완료</title>
    <style>
        :root { --gold: #ffcc00; --pink: #ff007f; --red: #ff0000; --bg: #050505; --blue: #00d4ff; --green: #00ff88; }
        body { background: var(--bg); color: white; font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; transition: background 0.1s; }
        
        /* [핵심] 지옥 대지진 연출 */
        body.hell-mode { animation: hellflash 0.1s infinite; }
        #container.hell-mode-active { animation: hellquake 0.05s infinite; }

        @keyframes hellquake {
            0% { transform: translate(10px, 10px) rotate(0deg); }
            10% { transform: translate(-10px, -8px) rotate(-1deg); }
            20% { transform: translate(-20px, 0px) rotate(1deg); }
            30% { transform: translate(20px, 8px) rotate(0deg); }
            40% { transform: translate(10px, -10px) rotate(1deg); }
            50% { transform: translate(-10px, 10px) rotate(-1deg); }
            60% { transform: translate(-20px, 8px) rotate(0deg); }
            70% { transform: translate(20px, -8px) rotate(1deg); }
            80% { transform: translate(-10px, -10px) rotate(-1deg); }
            90% { transform: translate(20px, 10px) rotate(0deg); }
            100% { transform: translate(10px, -8px) rotate(1deg); }
        }

        @keyframes hellflash {
            0%, 100% { background-color: #050505; }
            50% { background-color: #500; }
        }

        #lotto { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; border-radius: 50%; background: radial-gradient(circle, #151515, #000); box-shadow: inset 0 0 100px #000; }
        #container { position: relative; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        #main-layout { display: flex; justify-content: space-between; width: 100%; height: 100%; padding: 25px; box-sizing: border-box; }
        #main-layout > * { pointer-events: auto; }

        .side-panel { background: rgba(10, 10, 10, 0.95); border: 1px solid #333; border-radius: 20px; display: flex; flex-direction: column; padding: 20px; height: 88vh; box-shadow: 0 0 20px rgba(255,255,255,0.05); }
        .wide-left { width: 380px; }
        .wide-right { width: 420px; }
        .center-control { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); text-align: center; width: 500px; }
        #timer-display { font-size: 100px; font-weight: 900; color: var(--pink); text-shadow: 0 0 30px var(--pink); line-height: 1; }
        textarea { flex: 1; background: #000; color: #00ffcc; border: 1px solid #444; border-radius: 10px; padding: 15px; font-size: 14px; resize: none; outline: none; }
        #scroll-container { flex: 1; overflow-y: auto; }
        .item { padding: 12px; margin-bottom: 6px; background: #1a1a1a; border-radius: 8px; display: flex; justify-content: space-between; border-left: 5px solid #333; }
        .item.tracked { background: var(--red) !important; color: #fff !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .item.out { opacity: 0.15; filter: grayscale(1); border-left-color: #111; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #080808; padding: 40px; z-index: 9999; text-align: center; border-radius: 30px; border: 4px solid #fff; box-shadow: 0 0 150px #000; }
        #hell-warning { display: none; position: fixed; top: 30%; left: 50%; transform: translateX(-50%); color: red; font-size: 80px; font-weight: 900; text-shadow: 0 0 30px red; z-index: 10000; animation: warning-pulse 0.2s infinite; }
        @keyframes warning-pulse { 0%, 100% { opacity: 1; scale: 1; } 50% { opacity: 0.8; scale: 1.05; } }
        button { cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; scale: 1.05; }
    </style>
</head>
<body>
    <canvas id="lotto" width="800" height="800"></canvas>
    <div id="hell-warning">⚠️ 지옥의 문이 열렸습니다...돌아온 자들 ⚠️</div>

    <div id="container">
        <div id="main-layout">
            <div class="side-panel wide-left">
                <div id="target-box" style="height:120px; background:#100; border:3px solid #f00; border-radius:15px; display:flex; flex-direction:column; align-items:center; justify-content:center; margin-bottom:20px;">
                    <div style="font-size:12px; color:red; opacity:0.6;">ELIMINATED</div>
                    <div id="target-number" style="font-size:55px; font-weight:900; color:red; text-shadow:0 0 15px red;">? ?</div>
                </div>
                <div style="background:#111; padding:15px; border-radius:12px; margin-bottom:15px; display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:13px;">
                    <div>데스매치 기준<input type="number" id="deathLimit" value="20" style="width:100%; background:#000; color:#fff; border:1px solid #444;"></div>
                    <div>타이머(분)<input type="number" id="timerMin" value="7" onchange="resetTimer()" style="width:100%; background:#000; color:#fff; border:1px solid #444;"></div>
                </div>
                <textarea id="rawText" oninput="saveData()" placeholder="이름*개수"></textarea>
                <div style="margin-top:15px; color:var(--gold); font-weight:bold;">ALIVE: <span id="count-left">0</span></div>
            </div>

            <div class="center-control">
                <div id="god-panel" style="background:rgba(30,0,0,0.8); padding:15px; border-radius:15px; border:1px solid var(--red); display:inline-block; margin-bottom:20px;">
                    <input type="number" id="rerollCount" value="3" style="width:50px; text-align:center;">
                    <button onclick="useReroll()" style="background:#551a8b; color:white; padding:5px 15px; border:none;">REROLL</button>
                    <input type="number" id="reviveTarget" placeholder="번호" style="width:60px; text-align:center; margin-left:15px;">
                    <button onclick="manualRevive()" style="background:red; color:white; border:none; padding:5px 15px;">REVIVE</button>
                </div>
                <div id="timer-display">07:00</div>
                <div style="margin-top:10px;">
                    <button onclick="startTimer()">START</button>
                    <button onclick="stopTimer()">STOP</button>
                    <button onclick="resetTimer()">RESET</button>
                </div>
            </div>

            <div class="side-panel wide-right">
                <h3 style="color:var(--blue); margin:0 0 15px 0;">📡 SURVIVORS LIST</h3>
                <div id="scroll-container"></div>
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button onclick="loadData()" style="flex:1; padding:15px;">DATA LOAD</button>
                    <button onclick="runSurvival()" id="startBtn" style="flex:2; background:var(--gold); font-weight:900; font-size:18px; border:none;">START DRAW</button>
                </div>
            </div>
        </div>
    </div>

    <div id="judgement-pop" class="modal" style="border-color: var(--blue);">
        <h1 style="color:var(--blue);">⚠️ NEGOTIATION ⚠️ 부활권 비용 합의</h1>
        <div id="judgement-timer" style="font-size:60px; color:var(--blue); font-weight:900; margin:20px 0;">07:00</div>
        <input type="number" id="judge-input" placeholder="번호" style="font-size:30px; width:120px; text-align:center;">
        <div style="margin-top:30px;">
            <button onclick="approveRevive()" style="background:var(--blue); padding:15px 40px; font-weight:bold; border:none; color:#000;">부활승인</button>
            <button onclick="closeJudge()" style="background:#222; color:#fff; padding:15px 30px; border:none; margin-left:15px;">부활거절</button>
        </div>
    </div>

    <div id="dice-pop" class="modal" style="border-color: var(--green);">
        <h1 style="color:var(--green);">✨ DICE RESURRECTION ✨</h1>
        <div id="dice-number" style="font-size:100px; color:var(--green); font-weight:900; margin:20px 0;">?</div>
        <p id="dice-msg" style="font-size:20px; color:white; font-weight:bold;"></p>
    </div>
    <div id="win-pop" class="modal" style="border-color: var(--gold);">
        <h1 id="winner-name" style="color:var(--gold); font-size:45px;"></h1>
        <button onclick="location.reload()">NEW GAME</button>
    </div>

    <script>
        const canvas = document.getElementById('lotto');
        const ctx = canvas.getContext('2d');
        const scrollBox = document.getElementById('scroll-container');
        let balls = []; let isRunning = false; let isPaused = false;
        let timeLeft = 420; let timerInterval = null; let judgeInterval = null;
        let isHellUsed = false;

        let currentRerolls = parseInt(localStorage.getItem('lotto_rerolls')) || 3;
        document.getElementById('rerollCount').value = currentRerolls;

        class Ball {
            constructor(txt, id) { 
                this.txt = txt; this.id = id; this.r = 16; 
                this.x = 400 + (Math.random()-0.5)*500; 
                this.y = 400 + (Math.random()-0.5)*500; 
                this.vx = (Math.random()-0.5)*18; 
                this.vy = (Math.random()-0.5)*18; 
                this.color = `hsl(${Math.random()*360}, 85%, 60%)`; 
                this.isOut = false; this.isExiting = false; 
            }
            draw() { 
                if(this.isOut && !this.isExiting) return; 
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); 
                ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = "white"; 
                ctx.lineWidth = 1.5; ctx.stroke(); ctx.fillStyle = "#000"; 
                ctx.font = "bold 10px Arial"; ctx.textAlign="center"; 
                ctx.fillText(this.id + 1, this.x, this.y + 4); ctx.restore(); 
            }
            update() { 
                if(isPaused || (this.isOut && !this.isExiting)) return; 
                if(this.isExiting) { this.vx += (400-this.x)*0.3; this.vy += (-550-this.y)*0.3; } 
                this.x += this.vx; this.y += this.vy; 
                if(Math.hypot(this.x-400, this.y-400) > 390-this.r && !this.isExiting) { 
                    const a = Math.atan2(this.y-400, this.x-400); 
                    this.vx = -Math.cos(a)*18; this.vy = -Math.sin(a)*18; 
                } 
            }
        }

        function loadData() { 
            const raw = document.getElementById('rawText').value; 
            const lines = raw.split('\n').filter(l => l.trim() !== ""); 
            let temp = []; 
            lines.forEach(l => { 
                let name = l.trim(); let count = 1; 
                if(l.includes('*')) { const p = l.split('*'); name = p[0].trim(); count = parseInt(p[1])||1; } 
                for(let i=0; i<count; i++) temp.push(new Ball(name, temp.length)); 
            }); 
            balls = temp; renderList(); updateStatus(); 
        }

        function saveData() { localStorage.setItem('lotto_v19_7_text', document.getElementById('rawText').value); }
        function useReroll() { if(currentRerolls > 0) { currentRerolls--; localStorage.setItem('lotto_rerolls', currentRerolls); document.getElementById('rerollCount').value = currentRerolls; resetTimer(); if(isPaused) closeJudge(); } }
        
        async function runSurvival() {
            if(isRunning) return; isRunning = true;
            const step = async () => {
                if(isPaused) { setTimeout(step, 100); return; }
                
                // [보정] 나가는 중인 공까지 제외하고 진짜 생존자만 필터링
                const alives = balls.filter(b => !b.isOut && !b.isExiting);
                const total = alives.length;
                const limit = parseInt(document.getElementById('deathLimit').value);

                if(total > 1) {
                    // 협상권 이벤트
                    if(total <= 15 && Math.random() < 0.04) { triggerJudgement(); setTimeout(step, 100); return; }
                    
                    const target = alives[Math.floor(Math.random()*total)];
                    let delay = 10;
                    
                    if(total > 1000) delay = 5; 
                    else if(total > 50) delay = 30; 
                    else if(total > limit) delay = Math.random()*700 + 800;
                    else {
                        // 데스매치 연출 시 리스트와 번호 강제 동기화
                        document.getElementById('target-number').innerText = `#${target.id+1}`;
                        const el = document.getElementById(`item-${target.id}`);
                        if(el) { 
                            el.classList.add('tracked'); 
                            scrollBox.scrollTo({top: el.offsetTop - 150, behavior:'smooth'}); 
                        }
                        await new Promise(r => setTimeout(r, 3000));
                        delay = 50;
                    }
                    
                    // 탈락 처리 (비동기 완료 대기 생략하고 즉시 다음 단계 준비)
                    finalize(target);
                    if(total <= limit && Math.random() < 0.05) await triggerDiceRevive();
                    setTimeout(step, delay);

                } else if (total === 1) {
                    // [핵심 보정] 딱 한 명 남았을 때 즉시 승자 박제
                    isRunning = false;
                    const winner = alives[0]; 
                    
                    // 리스트 갱신 (마지막 생존자만 진하게)
                    renderList();
                    
                    document.getElementById('winner-name').innerText = `🏆 WINNER: ${winner.txt} (#${winner.id+1})`;
                    document.getElementById('win-pop').style.display = 'block';
                    
                    // 지옥 모드 발동 확률 (1.1은 테스트용이므로 0.3~0.5 추천하나 유지함)
                    if(!isHellUsed && Math.random() < 1.1) setTimeout(triggerHellMode, 5000);
                } else {
                    isRunning = false; // 공이 0개인 예외 상황 방지
                }
            };
            step();
        }

        function finalize(ball) { 
            ball.isExiting = true; 
            // 탈락 처리 시간 단축 및 리스트 즉시 반영
            setTimeout(() => { 
                ball.isOut = true; 
                ball.isExiting = false; 
                const el = document.getElementById(`item-${ball.id}`); 
                if(el) { 
                    el.classList.remove('tracked'); 
                    el.classList.add('out'); 
                } 
                updateStatus(); 
            }, 300); 
        }

        async function triggerDiceRevive() { 
            isPaused = true; 
            const deads = balls.filter(b => b.isOut); 
            if(deads.length === 0) { isPaused = false; return; } 
            document.getElementById('dice-pop').style.display = 'block'; 
            
            for(let i=0; i<15; i++) { 
                document.getElementById('dice-number').innerText = deads[Math.floor(Math.random()*deads.length)].id + 1; 
                await new Promise(r => setTimeout(r, 100)); 
            } 
            
            const final = deads[Math.floor(Math.random()*deads.length)]; 
            document.getElementById('dice-number').innerText = final.id + 1; 
            document.getElementById('dice-msg').innerText = `${final.txt}님 부활!`; 
            await new Promise(r => setTimeout(r, 2000)); 
            
            final.isOut=false; final.isExiting=false; final.x=400; final.y=400; 
            document.getElementById('dice-pop').style.display='none'; 
            isPaused=false; 
            updateStatus(); 
            renderList(); 
        }

        function triggerJudgement() { 
            isPaused = true; 
            document.getElementById('judgement-pop').style.display = 'block'; 
            if(judgeInterval) clearInterval(judgeInterval); 
            judgeInterval = setInterval(() => { 
                if(timeLeft > 0) { timeLeft--; updateTimeDisplay(); } 
                else { closeJudge(); } 
            }, 1000); 
        }

        function approveRevive() { 
            const val = parseInt(document.getElementById('judge-input').value);
            const id = val - 1; 
            const b = balls.find(x => x.id === id); 
            if(b && b.isOut) { 
                b.isOut=false; b.isExiting=false; b.x=400; b.y=400; 
                closeJudge(); 
                updateStatus(); 
                renderList(); 
            } else {
                alert("탈락자 번호를 정확히 입력해주세요.");
            }
        }

        function closeJudge() { document.getElementById('judgement-pop').style.display='none'; isPaused=false; clearInterval(judgeInterval); }
        
        function triggerHellMode() {
            isHellUsed = true; document.getElementById('win-pop').style.display = 'none';
            document.body.classList.add('hell-mode');
            document.getElementById('container').classList.add('hell-mode-active');
            document.getElementById('hell-warning').style.display = 'block';
            
            setTimeout(() => {
                const deads = balls.filter(b => b.isOut);
                const count = Math.min(Math.floor(Math.random()*9)+2, deads.length);
                for(let i=0; i<count; i++) {
                    const rb = deads.splice(Math.floor(Math.random()*deads.length), 1)[0];
                    rb.isOut=false; rb.isExiting=false; rb.x=400; rb.y=400;
                }
                document.body.classList.remove('hell-mode');
                document.getElementById('container').classList.remove('hell-mode-active');
                document.getElementById('hell-warning').style.display = 'none';
                updateStatus(); 
                renderList(); 
                isRunning = false; // 상태 초기화 후 재시작
                runSurvival();
            }, 5000);
        }

        function startTimer() { if(!timerInterval) timerInterval = setInterval(() => { if(timeLeft > 0 && !isPaused) { timeLeft--; updateTimeDisplay(); } }, 1000); }
        function stopTimer() { clearInterval(timerInterval); timerInterval = null; }
        function resetTimer() { stopTimer(); timeLeft = parseInt(document.getElementById('timerMin').value)*60; updateTimeDisplay(); }
        function updateTimeDisplay() { const m = Math.floor(timeLeft/60); const s = timeLeft%60; const res = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; document.getElementById('timer-display').innerText = res; document.getElementById('judgement-timer').innerText = res; }
        
        function manualRevive() { 
            const id = parseInt(document.getElementById('reviveTarget').value)-1; 
            const b = balls.find(x => x.id === id); 
            if(b && b.isOut) { 
                b.isOut=false; b.isExiting=false; b.x=400; b.y=400; 
                updateStatus(); 
                renderList(); 
            } 
        }

        function renderList() { 
            // [보정] 리스트 렌더링 시 최신 isOut 상태를 100% 반영
            scrollBox.innerHTML = balls.map(b => `<div class="item ${b.isOut?'out':''}" id="item-${b.id}"><span>#${b.id+1} ${b.txt}</span></div>`).join(''); 
        }

        function updateStatus() { document.getElementById('count-left').innerText = balls.filter(b => !b.isOut).length; }
        function ani() { ctx.clearRect(0,0,800,800); balls.forEach(b => { b.update(); b.draw(); }); requestAnimationFrame(ani); }

        window.onload = () => { 
            const t = localStorage.getItem('lotto_v19_7_text'); 
            if(t){ document.getElementById('rawText').value=t; loadData(); } 
        };

        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'UPDATE_LIST') {
                const textArea = document.getElementById('rawText');
                if (textArea) {
                    textArea.value = e.data.data;
                    if (typeof loadData === 'function' && typeof saveData === 'function') {
                        loadData(); 
                        saveData();
                    }
                }
            }
        });

        ani();
    </script>
</body>
</html>
